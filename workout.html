<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <title>Workout</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --border2: #2a2a2a;
      --accent: #2563eb; --green: #22c55e; --text: #f0f0f0; --muted: #888; --dim: #555;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh; -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
    }
    body { max-width: 480px; margin: 0 auto; padding-bottom: calc(40px + var(--safe-bottom)); }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input { font-family: inherit; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* HOME */
    #home-header { padding: calc(var(--safe-top) + 44px) 24px 24px; border-bottom: 1px solid var(--border); }
    .app-title { font-size: 30px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; }
    .app-sub { font-size: 11px; color: var(--dim); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
    .day-cards { display: flex; gap: 12px; padding: 20px 16px 16px; }
    .day-card {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 14px; text-align: left; color: var(--text);
      transition: border-color 0.15s, transform 0.1s;
    }
    .day-card:active { transform: scale(0.97); border-color: var(--accent); }
    .day-letter { font-size: 44px; font-weight: 900; color: var(--accent); line-height: 1; }
    .day-label { font-size: 11px; color: var(--muted); margin: 4px 0 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .day-ex-item { font-size: 11px; color: var(--dim); margin-bottom: 3px; }
    .last-session { margin: 0 16px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .last-session-title { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 14px 6px; border-bottom: 1px solid var(--border); }
    .last-session-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .last-session-row:last-child { border-bottom: none; }
    .last-session-ex { color: var(--muted); }
    .last-session-w { color: var(--accent); font-weight: 700; }

    /* REST CHIPS — shared style used in both home and session */
    .rest-setting { display: flex; align-items: center; gap: 10px; padding: 12px 16px 4px; }
    .rest-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
    .rest-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .rest-chip { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: var(--dim); font-size: 12px; padding: 5px 11px; transition: border-color 0.15s, color 0.15s; }
    .rest-chip.active { border-color: var(--accent); color: var(--accent); }

    /* SESSION */
    #session-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 20px 14px; border-bottom: 1px solid #1a1a1a;
    }
    #back-btn { font-size: 13px; color: var(--dim); padding: 4px 0; }
    #session-title { font-size: 14px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
    #progress-counter { font-size: 13px; color: var(--accent); font-weight: 700; }
    #session-rest { border-bottom: 1px solid var(--border); padding: 10px 16px; }

    #exercise-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; transition: opacity 0.25s, border-color 0.25s; }
    .ex-card.done { opacity: 0.38; border-color: #1a2a1a; }
    .ex-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .ex-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .ex-meta { font-size: 11px; color: var(--dim); margin-top: 3px; }
    .ex-weight-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .ex-last-w { font-size: 10px; color: var(--dim); text-align: right; }
    .weight-input {
      background: #1a1a1a; border: 1px solid var(--border2); border-radius: 7px;
      color: var(--muted); font-size: 16px; font-weight: 600;
      padding: 5px 8px; width: 70px; text-align: center; outline: none; -webkit-appearance: none;
    }
    .weight-input:focus { border-color: var(--accent); color: var(--text); }
    .set-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .set-btn {
      width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--border2);
      background: #1a1a1a; color: var(--dim); font-size: 15px; font-weight: 700;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.08s;
    }
    .set-btn:active { transform: scale(0.92); }
    .set-btn.done { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* INLINE CARD TIMER */
    .card-timer {
      display: none; align-items: center; justify-content: space-between;
      margin-top: 10px; padding: 10px 12px; background: #1a1a1a;
      border: 1px solid var(--border2); border-radius: 9px; transition: background 0.3s, border-color 0.3s;
    }
    .card-timer.visible { display: flex; }
    .card-timer.go { background: var(--green); border-color: var(--green); }
    .ct-count { font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; color: var(--text); }
    .card-timer.go .ct-count { display: none; }
    .ct-go { display: none; font-size: 18px; font-weight: 900; color: #000; letter-spacing: 0.25em; flex: 1; text-align: center; }
    .card-timer.go .ct-go { display: block; }
    .card-timer.go .ct-actions { display: none; }
    .ct-actions { display: flex; gap: 6px; align-items: center; }
    .t-btn { background: #2a2a2a; border-radius: 7px; color: var(--muted); padding: 6px 11px; font-size: 15px; transition: background 0.1s; }
    .t-btn:active { background: #383838; }
    .t-skip { background: transparent; color: var(--dim); font-size: 12px; letter-spacing: 0.06em; padding: 6px 4px; }

    /* DONE */
    #done-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; padding: 32px; text-align: center; }
    .done-check { font-size: 72px; color: var(--green); line-height: 1; }
    .done-title { font-size: 26px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
    .done-sub { font-size: 14px; color: var(--muted); }
    .done-weights { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 300px; overflow: hidden; margin-top: 8px; }
    .done-weights-title { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 14px 6px; border-bottom: 1px solid var(--border); text-align: left; }
    .done-w-row { display: flex; justify-content: space-between; padding: 7px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .done-w-row:last-child { border-bottom: none; }
    .done-w-ex { color: var(--muted); }
    .done-w-val { color: var(--accent); font-weight: 700; }
    .done-btn { margin-top: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-size: 14px; padding: 13px 32px; }
    .done-btn:active { border-color: var(--accent); }
  </style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div id="home-header">
    <div class="app-title">Workout</div>
    <div class="app-sub">Select today's session</div>
  </div>
  <div id="last-session-container"></div>
  <div class="day-cards">
    <button class="day-card" onclick="startSession('A')">
      <div class="day-letter">A</div>
      <div class="day-label">Day A</div>
      <div id="day-a-list"></div>
    </button>
    <button class="day-card" onclick="startSession('B')">
      <div class="day-letter">B</div>
      <div class="day-label">Day B</div>
      <div id="day-b-list"></div>
    </button>
  </div>
</div>

<!-- SESSION -->
<div id="screen-session" class="screen">
  <div id="session-header">
    <button id="back-btn" onclick="goHome()">← Back</button>
    <div id="session-title">Day A</div>
    <div id="progress-counter">0/0</div>
  </div>
  <div id="session-rest" class="rest-setting">
    <span class="rest-label">Rest</span>
    <div class="rest-chips" id="session-rest-chips"></div>
  </div>
  <div id="exercise-list"></div>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div id="done-screen">
    <div class="done-check">✓</div>
    <div class="done-title">Session Done</div>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-weights" id="done-weights"></div>
    <button class="done-btn" onclick="goHome()">Back to Home</button>
  </div>
</div>

<script>
  const PROGRAM = {
    A: {
      label: 'Day A',
      exercises: [
        { id: 'squat',  name: 'Squat',                 sets: 3, reps: '5',    note: 'To parallel' },
        { id: 'bench',  name: 'Bench Press',            sets: 3, reps: '5',    note: '' },
        { id: 'row',    name: 'Barbell Row',            sets: 3, reps: '5',    note: '' },
        { id: 'tricep', name: 'Cable Tricep Pushdown', sets: 3, reps: '8',    note: '' },
        { id: 'curl',   name: 'Cable Curl',            sets: 3, reps: '8',    note: '' },
        { id: 'plank',  name: 'Plank',                 sets: 3, reps: '45s',  note: 'Core finisher', noWeight: true },
      ]
    },
    B: {
      label: 'Day B',
      exercises: [
        { id: 'dead',     name: 'Deadlift',                sets: 3, reps: '5',    note: 'Cap at 315' },
        { id: 'ohp',      name: 'Overhead Press',          sets: 3, reps: '5',    note: 'Strict' },
        { id: 'pull',     name: 'Pull-ups / Lat Pulldown', sets: 3, reps: '5-8',  note: 'Weighted if easy' },
        { id: 'face',     name: 'Cable Face Pull',         sets: 3, reps: '12',   note: "Don't skip" },
        { id: 'carry',    name: 'Farmer Carry',            sets: 3, reps: '40ft', note: '' },
        { id: 'legraise', name: 'Hanging Leg Raises',      sets: 3, reps: '10',   note: 'Core finisher', noWeight: true },
      ]
    }
  };

  const REST_OPTIONS = [90, 120, 150, 180];
  const STORAGE_KEY = 'wk_history';

  let currentDay  = null;
  let completed   = {};
  let weights     = {};
  let restDuration = 150;
  let timerEndTime = null;
  let timerExId    = null;
  let timerInterval = null;
  let timerPausedRemaining = null;
  let sessionActive = false;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveSession(day, w) {
    const h = loadHistory();
    h[day] = { weights: w, date: new Date().toLocaleDateString() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
  }

  function buildRestChips(containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    REST_OPTIONS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'rest-chip' + (s === restDuration ? ' active' : '');
      btn.textContent = s === 90 ? '1:30' : s === 120 ? '2:00' : s === 150 ? '2:30 ★' : '3:00';
      btn.dataset.val = s;
      btn.onclick = () => {
        restDuration = s;
        document.querySelectorAll('.rest-chip').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.rest-chip[data-val="' + s + '"]').forEach(c => c.classList.add('active'));
      };
      container.appendChild(btn);
    });
  }

  function init() {
    ['A','B'].forEach(d => {
      const el = document.getElementById('day-' + d.toLowerCase() + '-list');
      PROGRAM[d].exercises.forEach(ex => {
        const div = document.createElement('div');
        div.className = 'day-ex-item';
        div.textContent = ex.name;
        el.appendChild(div);
      });
    });

    buildRestChips('session-rest-chips');

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && timerEndTime !== null) tickTimer();
    });

    renderLastSession();
  }

  function renderLastSession() {
    const container = document.getElementById('last-session-container');
    container.innerHTML = '';
    const h = loadHistory();
    Object.keys(h).forEach(d => {
      const sess = h[d];
      if (!sess || !PROGRAM[d]) return;
      const logged = PROGRAM[d].exercises.filter(ex => sess.weights && sess.weights[ex.id]);
      if (!logged.length) return;
      const block = document.createElement('div');
      block.className = 'last-session';
      block.innerHTML = '<div class="last-session-title">Last ' + PROGRAM[d].label + ' · ' + (sess.date || '') + '</div>';
      logged.forEach(ex => {
        const row = document.createElement('div');
        row.className = 'last-session-row';
        row.innerHTML = '<span class="last-session-ex">' + ex.name + '</span><span class="last-session-w">' + sess.weights[ex.id] + ' lbs</span>';
        block.appendChild(row);
      });
      container.appendChild(block);
    });
  }

  function startSession(day) {
    // If a session is already active with a different day, warn
    if (sessionActive && currentDay && currentDay !== day) {
      if (!confirm('Switch to Day ' + day + '? Current progress will be lost.')) return;
    }

    currentDay = day;
    completed  = {};
    weights    = {};
    sessionActive = true;
    stopTimer();

    PROGRAM[day].exercises.forEach(ex => { completed[ex.id] = Array(ex.sets).fill(false); });

    const h = loadHistory();
    if (h[day] && h[day].weights) Object.assign(weights, h[day].weights);

    document.getElementById('session-title').textContent = PROGRAM[day].label;
    showScreen('session');
    renderExercises();
    updateProgress();
  }

  function renderExercises() {
    const list = document.getElementById('exercise-list');
    list.innerHTML = '';
    const h = loadHistory();
    const lastW = (h[currentDay] && h[currentDay].weights) ? h[currentDay].weights : {};

    PROGRAM[currentDay].exercises.forEach(ex => {
      const card = document.createElement('div');
      card.className = 'ex-card' + (completed[ex.id].every(Boolean) ? ' done' : '');
      card.id = 'card-' + ex.id;

      const meta = [ex.sets + ' × ' + ex.reps, ex.note].filter(Boolean).join(' · ');
      const lastLabel = lastW[ex.id] ? 'Last: ' + lastW[ex.id] + ' lbs' : '';
      const weightField = ex.noWeight ? '' :
        '<div class="ex-weight-wrap">' +
        (lastLabel ? '<div class="ex-last-w">' + lastLabel + '</div>' : '') +
        '<input class="weight-input" type="number" inputmode="decimal" placeholder="lbs" value="' + (weights[ex.id] || '') + '" onchange="setWeight(\'' + ex.id + '\', this.value)" />' +
        '</div>';

      card.innerHTML =
        '<div class="ex-top"><div><div class="ex-name">' + ex.name + '</div><div class="ex-meta">' + meta + '</div></div>' + weightField + '</div>' +
        '<div class="set-row" id="sets-' + ex.id + '"></div>' +
        '<div class="card-timer" id="timer-' + ex.id + '">' +
          '<span class="ct-count">0:00</span>' +
          '<span class="ct-go">GO</span>' +
          '<div class="ct-actions">' +
            '<button class="t-btn ct-pause" onclick="pauseTimer()">⏸</button>' +
            '<button class="t-btn" onclick="resetTimer()">↺</button>' +
            '<button class="t-btn t-skip" onclick="skipTimer()">Skip</button>' +
          '</div>' +
        '</div>';

      const setRow = card.querySelector('#sets-' + ex.id);
      for (let i = 0; i < ex.sets; i++) {
        const btn = document.createElement('button');
        btn.className = 'set-btn' + (completed[ex.id][i] ? ' done' : '');
        btn.textContent = completed[ex.id][i] ? '✓' : (i + 1);
        btn.onclick = () => toggleSet(ex.id, i, btn);
        setRow.appendChild(btn);
      }

      list.appendChild(card);
    });
  }

  function toggleSet(exId, idx, btn) {
    const was = completed[exId][idx];
    completed[exId][idx] = !was;

    if (!was) {
      btn.classList.add('done');
      btn.textContent = '✓';
      startTimer(restDuration, exId);
    } else {
      btn.classList.remove('done');
      btn.textContent = idx + 1;
    }

    const allDone = completed[exId].every(Boolean);
    const card = document.getElementById('card-' + exId);
    if (allDone) card.classList.add('done');
    else card.classList.remove('done');

    updateProgress();
    checkSessionComplete();
  }

  function setWeight(exId, val) { weights[exId] = val; }

  function updateProgress() {
    const exercises = PROGRAM[currentDay].exercises;
    const total = exercises.reduce((a, ex) => a + ex.sets, 0);
    const done  = exercises.reduce((a, ex) => a + completed[ex.id].filter(Boolean).length, 0);
    document.getElementById('progress-counter').textContent = done + '/' + total;
  }

  function checkSessionComplete() {
    const allDone = PROGRAM[currentDay].exercises.every(ex => completed[ex.id].every(Boolean));
    if (allDone) { stopTimer(); saveSession(currentDay, weights); sessionActive = false; showDone(); }
  }

  // TIMER
  function startTimer(seconds, exId) {
    stopTimer();
    timerExId = exId;
    timerPausedRemaining = null;
    timerEndTime = Date.now() + seconds * 1000;
    showTimerCard(exId);
    timerInterval = setInterval(tickTimer, 250);
  }

  function tickTimer() {
    if (timerEndTime === null) return;
    const remaining = Math.max(0, Math.ceil((timerEndTime - Date.now()) / 1000));
    updateTimerCard(timerExId, remaining);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerEndTime = null;
    }
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerEndTime = null;
    timerPausedRemaining = null;
    if (timerExId) hideTimerCard(timerExId);
    timerExId = null;
  }

  function pauseTimer() {
    if (!timerExId) return;
    const card = document.getElementById('timer-' + timerExId);
    const pauseBtn = card.querySelector('.ct-pause');
    if (timerEndTime !== null) {
      timerPausedRemaining = Math.max(0, timerEndTime - Date.now());
      timerEndTime = null;
      clearInterval(timerInterval);
      timerInterval = null;
      pauseBtn.textContent = '▶';
    } else if (timerPausedRemaining !== null) {
      timerEndTime = Date.now() + timerPausedRemaining;
      timerPausedRemaining = null;
      timerInterval = setInterval(tickTimer, 250);
      pauseBtn.textContent = '⏸';
    }
  }

  function resetTimer() {
    if (!timerExId) return;
    const card = document.getElementById('timer-' + timerExId);
    card.querySelector('.ct-pause').textContent = '⏸';
    timerPausedRemaining = null;
    timerEndTime = Date.now() + restDuration * 1000;
    card.classList.remove('go');
    clearInterval(timerInterval);
    timerInterval = setInterval(tickTimer, 250);
  }

  function skipTimer() { stopTimer(); }

  function showTimerCard(exId) {
    const card = document.getElementById('timer-' + exId);
    if (card) { card.classList.add('visible'); card.classList.remove('go'); }
  }

  function hideTimerCard(exId) {
    const card = document.getElementById('timer-' + exId);
    if (card) { card.classList.remove('visible', 'go'); }
  }

  function updateTimerCard(exId, remaining) {
    const card = document.getElementById('timer-' + exId);
    if (!card) return;
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    card.querySelector('.ct-count').textContent = m + ':' + String(s).padStart(2, '0');
    if (remaining <= 0) card.classList.add('go');
    else card.classList.remove('go');
  }

  // DONE
  function showDone() {
    const exercises = PROGRAM[currentDay].exercises;
    const total = exercises.reduce((a, ex) => a + ex.sets, 0);
    document.getElementById('done-sub').textContent = PROGRAM[currentDay].label + ' · ' + total + ' sets complete';
    const dw = document.getElementById('done-weights');
    const logged = exercises.filter(ex => weights[ex.id]);
    if (logged.length) {
      dw.innerHTML = '<div class="done-weights-title">Weights Logged</div>';
      logged.forEach(ex => {
        const row = document.createElement('div');
        row.className = 'done-w-row';
        row.innerHTML = '<span class="done-w-ex">' + ex.name + '</span><span class="done-w-val">' + weights[ex.id] + ' lbs</span>';
        dw.appendChild(row);
      });
      dw.style.display = 'block';
    } else {
      dw.style.display = 'none';
    }
    showScreen('done');
  }

  function goHome() {
    stopTimer();
    renderLastSession();
    showScreen('home');
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    window.scrollTo(0, 0);
  }

  init();
</script>
</body>
</html>
